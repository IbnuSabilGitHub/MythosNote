{% extends 'base.html' %}

{% block title %}Reset Tidak Valid - MythosNote{% endblock %}

{% block content %}
<section class="flex min-h-screen items-center justify-center bg-neutral-900 px-6 py-24">
    <div class="w-full max-w-lg border border-stone-700 bg-neutral-950 p-8 text-center">
        <h1 class="font-newsreader text-3xl text-on-surface">Link reset tidak valid</h1>
        <p class="mt-4 font-['Manrope'] text-base leading-6 text-on-surface-variant">
            Link reset password mungkin sudah dipakai atau kedaluwarsa.
        </p>
        <a href="{% url 'forgot_password' %}"
            class="mt-8 inline-flex bg-primary px-6 py-3 font-['Manrope'] text-sm font-semibold text-yellow-950 transition hover:bg-primary/70">
            Minta Link Baru
        </a>
    </div>
</section>
{% endblock %}
