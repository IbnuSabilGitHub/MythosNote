{% if GOOGLE_OAUTH_CLIENT_ID %}
<div class="flex flex-col items-start justify-start gap-3 self-stretch">
    <div class="flex items-center gap-3 self-stretch">
        <div class="h-px flex-1 bg-stone-700"></div>
        <span class="font-manrope text-xs uppercase tracking-wider text-stone-400">atau</span>
        <div class="h-px flex-1 bg-stone-700"></div>
    </div>
    <form id="google-oauth-form" method="post" action="{% url 'google_signin' %}">
        {% csrf_token %}
        <input id="google-oauth-credential" type="hidden" name="credential" />
    </form>
    <div id="g_id_onload" data-client_id="{{ GOOGLE_OAUTH_CLIENT_ID|escape }}" data-callback="handleGoogleCredential"
        data-auto_prompt="false"></div>
    <div id="google-button-container" class="w-full flex justify-center"></div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    // Google Identity Services posts a short-lived credential to Django for validation.
    function handleGoogleCredential(response) {
        document.getElementById("google-oauth-credential").value = response.credential;
        document.getElementById("google-oauth-form").submit();
    }

    function renderGoogleButton() {
        const container = document.getElementById("google-button-container");
        if (container && window.google && window.google.accounts) {
            // Get parent container width or fallback to 320, clamp between 200 and 384
            const parentWidth = container.parentElement.offsetWidth || 320;
            const btnWidth = Math.max(200, Math.min(parentWidth, 384));
            
            container.innerHTML = "";
            window.google.accounts.id.renderButton(container, {
                type: "standard",
                theme: "filled_black",
                size: "large",
                width: btnWidth,
                text: "continue_with"
            });
        }
    }

    // Wait for the Google script to load, then render
    window.addEventListener('load', function() {
        const interval = setInterval(function() {
            if (window.google && window.google.accounts && window.google.accounts.id) {
                clearInterval(interval);
                renderGoogleButton();
            }
        }, 100);
    });

    // Handle screen resize
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(renderGoogleButton, 200);
    });
</script>
{% else %}
<div class="self-stretch rounded-sm border border-stone-700 bg-neutral-900 px-4 py-3 text-center">
    <span class="font-manrope text-sm text-stone-400">
        Google OAuth belum dikonfigurasi.
    </span>
</div>
{% endif %}
