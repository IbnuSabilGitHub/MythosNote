{# Delete Workspace Modal #}
<div id="deleteWorkspaceModal" tabindex="-1" aria-hidden="true"
  class="fixed inset-0 z-50 hidden h-full w-full bg-zinc-950/80 p-4 backdrop-blur-sm">
  <div class="flex h-full w-full items-center justify-center">
    <div class="relative w-full max-w-md overflow-hidden rounded-xl border border-surface-container-high bg-[#1a1a22] shadow-2xl">
      <div class="p-6 pb-4">
        <div class="mb-4 flex items-center gap-3">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-error/20 bg-error/10">
            <iconify-icon icon="tabler:alert-triangle" class="text-error text-xl"></iconify-icon>
          </div>
          <h3 id="deleteWorkspaceTitle" class="font-newsreader text-xl text-on-surface">Hapus Workspace?</h3>
        </div>
        <p id="deleteWorkspaceDescription" class="font-manrope text-sm leading-[1.6] text-on-surface-variant">
          Tindakan ini tidak dapat dibatalkan. Menghapus workspace akan menghapus semua file, dokumen, dan analisis AI yang terkait secara permanen dari server.
        </p>
      </div>
      <div class="flex justify-end gap-3 border-t border-surface-container-high bg-surface-container-low p-4">
        <button type="button" id="deleteWorkspaceCancel"
          class="rounded-lg border border-surface-container-high bg-transparent px-4 py-2 font-manrope text-sm text-on-surface-variant transition-colors hover:bg-surface-container hover:text-on-surface focus:outline-none focus:ring-1 focus:ring-outline">
          Batal
        </button>
        <button type="button" id="deleteWorkspaceConfirm"
          class="rounded-lg bg-error px-4 py-2 font-manrope text-sm font-medium text-[#131317] transition-colors hover:bg-error/90 focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2 focus:ring-offset-[#1a1a22]">
          Hapus
        </button>
      </div>
    </div>
  </div>
</div>
