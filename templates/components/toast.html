<!-- Toast Container -->
<div id="toast-container" class="fixed right-4 bottom-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

<!-- Toast Template -->
<template id="toast-template">
    <div class="toast-item pointer-events-auto flex items-start gap-3 rounded-sm bg-neutral-800 border border-stone-700 px-4 py-3 shadow-lg animate-slide-in-right">
        <iconify-icon class="toast-icon h-5 w-5 shrink-0 mt-0.5" icon="tabler:info-circle"></iconify-icon>
        <div class="flex-1">
            <p class="toast-message font-['Manrope'] text-sm font-normal text-stone-300"></p>
        </div>
        <button class="toast-close shrink-0 text-stone-500 hover:text-stone-300 transition">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
        </button>
    </div>
</template>

<!-- Toast Action Template (with confirm buttons) -->
<template id="toast-action-template">
    <div class="toast-action-item pointer-events-auto flex items-start gap-4 rounded-sm bg-neutral-800 border border-stone-700 px-4 py-4 shadow-lg animate-slide-in-right">
        <iconify-icon class="toast-action-icon h-5 w-5 shrink-0 mt-0.5" icon="tabler:info-circle"></iconify-icon>
        <div class="flex-1">
            <h3 class="toast-action-title font-['Manrope'] text-sm font-semibold text-on-surface mb-1"></h3>
            <p class="toast-action-message font-['Manrope'] text-sm font-normal text-stone-400"></p>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button class="toast-action-cancel px-3 py-2 text-xs font-semibold text-stone-300 hover:text-stone-200 transition">
                Batal
            </button>
            <button class="toast-action-confirm px-3 py-2 text-xs font-semibold bg-primary hover:bg-primary/80 text-yellow-950 transition rounded-sm">
                Konfirmasi
            </button>
        </div>
    </div>
</template>

<style>
/* Animasi Masuk dari Kanan */
@keyframes slide-in-right {
    from {
        opacity: 0;
        transform: translateX(100%);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* Animasi Keluar ke arah Kanan */
@keyframes slide-out-right {
    from {
        opacity: 1;
        transform: translateX(0);   
    }
    to {
        opacity: 0;
        transform: translateX(100%);
    }
}

/* Class Utility */
.animate-slide-in-right {
    animation: slide-in-right 0.3s ease-out;
}

.animate-slide-out-right {
    animation: slide-out-right 0.3s ease-out forwards;
}
</style>
