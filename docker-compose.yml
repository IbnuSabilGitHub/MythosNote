services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mythosnote}
      POSTGRES_USER: ${POSTGRES_USER:-mythosnote_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mythosnote_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mythosnote_user} -d ${POSTGRES_DB:-mythosnote}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-mythosnote_redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mythosnote_redis_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    # Development:
    # command: sh -c "python3 manage.py migrate && python3 manage.py runserver 0.0.0.0:8000"
    # Production:
    command: sh -c "python3 manage.py collectstatic --noinput --ignore input.css && python3 manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --limit-request-field_size 16384 --forwarded-allow-ips='*'"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mythosnote_user}:${POSTGRES_PASSWORD:-mythosnote_password}@db:5432/${POSTGRES_DB:-mythosnote}
      REDIS_URL: redis://:${REDIS_PASSWORD:-mythosnote_redis_pass}@redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    ports:
      - "80:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: sh -c "python3 manage.py rqworker default"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mythosnote_user}:${POSTGRES_PASSWORD:-mythosnote_password}@db:5432/${POSTGRES_DB:-mythosnote}
      REDIS_URL: redis://:${REDIS_PASSWORD:-mythosnote_redis_pass}@redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
